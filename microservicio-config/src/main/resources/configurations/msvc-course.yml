server:
    port: 9090

spring:
    application:
            name: msvc-course
    datasource:
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://localhost:5432/
        username: postgres
        password: postgres
    jpa:
        hibernate:
            ddl-auto: update
        database: postgresql
        database-platform: org.hibernate.dialect.PostgreSQLDialect
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
        show-sql: true

eureka:
    instance:
        hostname: localhost
    client:
        service-url: 
            defaultZone: http://localhost:8761/eureka